<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Tom Waterson</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-style: normal; }
    :root {
      --bg: #0c0c0c; --border: #262626; --text: #d4d0c8;
      --muted: #666; --accent: #5b8fa8; --link: #7aafc4;
      --sans: 'IBM Plex Sans', sans-serif; --mono: 'IBM Plex Mono', monospace;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); font-weight: 300; font-size: 17px; line-height: 1.75; -webkit-font-smoothing: antialiased; }
    .container { max-width: 700px; margin: 0 auto; padding: 0 2rem; }
    nav { position: sticky; top: 0; z-index: 10; background: var(--bg); border-bottom: 1px solid var(--border); }
    nav .container { display: flex; justify-content: space-between; align-items: center; padding-top: 1rem; padding-bottom: 1rem; }
    .nav-name { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.03em; text-decoration: none; }
    .nav-links { display: flex; gap: 1.75rem; list-style: none; }
    .nav-links a { font-family: var(--mono); font-size: 12px; color: var(--muted); text-decoration: none; letter-spacing: 0.04em; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }
    main { padding: 5rem 0; border-bottom: 1px solid var(--border); }
    .section-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; margin-bottom: 2.5rem; }
    .lead { font-size: 1rem; font-weight: 300; color: var(--muted); max-width: 480px; margin-bottom: 2.5rem; line-height: 1.8; }
    .contact-links { display: flex; flex-direction: column; gap: 0.6rem; }
    .contact-row { display: flex; align-items: center; gap: 1.25rem; }
    .contact-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; width: 70px; }
    .contact-value { font-family: var(--mono); font-size: 13px; color: var(--link); text-decoration: none; }
    .contact-value:hover { text-decoration: underline; }
    footer { padding: 2.5rem 0; text-align: center; }
    footer p { font-family: var(--mono); font-size: 11px; color: var(--border); letter-spacing: 0.06em; }
  </style>
</head>
<body>
<nav>
  <div class="container">
    <a href="index.html" class="nav-name">tomwaterson.com</a>
    <ul class="nav-links">
      <li><a href="about.html">About</a></li>
      <li><a href="publications.html">Publications</a></li>
      <li><a href="notes.html">Notes</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </div>
</nav>
<main>
  <div class="container">
    <p class="section-label">Contact</p>
    <div class="contact-links">
      <div class="contact-row">
        <span class="contact-label">Email</span>
        <a href="mailto:tomwaterson628@gmail.com" class="contact-value">tomwaterson628@gmail.com</a>
      </div>
      <div class="contact-row">
        <span class="contact-label">Twitter</span>
        <a href="https://x.com/tom_waterson" class="contact-value">https://x.com/tom_waterson</a>
      </div>
      <div class="contact-row">
        <span class="contact-label">LinkedIn</span>
        <a href="https://www.linkedin.com/in/tom-waterson-5207b33/" class="contact-value">https://www.linkedin.com/in/tom-waterson-5207b33/</a>
      </div>
    </div>
  </div>
</main>
<footer>
  <div class="container"><p>Tom Waterson &mdash; tomwaterson.com</p></div>
</footer>
</body>
</html>
